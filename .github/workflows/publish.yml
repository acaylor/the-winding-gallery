name: Publish to npm

# Publishes via npm trusted publishing (OIDC) — no NPM_TOKEN secret needed.
# One-time setup on npmjs.com → package → Settings → Trusted publisher:
#   GitHub Actions · owner: acaylor · repo: the-winding-gallery · workflow: publish.yml
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub release
      id-token: write # OIDC token exchange with the npm registry
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # deps + tests via pnpm; the publish itself uses the npm CLI,
      # which is what npm's trusted publishing requires (≥ 11.5.1)
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: Check tag matches package.json version
        run: |
          PKG_V="v$(node -p "require('./package.json').version")"
          if [ "$PKG_V" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_V}" >&2
            exit 1
          fi
      # Keep a Changelog is the source of truth for release notes: stable
      # tags REQUIRE a matching section (this step fails the publish if it
      # is missing); prereleases publish the Unreleased section.
      - name: Extract release notes from CHANGELOG.md
        run: node scripts/changelog-notes.js "${GITHUB_REF_NAME}" > release-notes.md
      - name: Publish (prereleases → the "next" dist-tag)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [[ "$VERSION" == *-* ]]; then
            echo "Publishing $VERSION as a prerelease (dist-tag: next)"
            npm publish --provenance --tag next
          else
            echo "Publishing $VERSION as the latest release"
            npm publish --provenance
          fi
      - name: Create GitHub release with the changelog notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then PRE=--prerelease; else PRE=; fi
          gh release create "${GITHUB_REF_NAME}" $PRE \
            --title "${GITHUB_REF_NAME}" \
            --notes-file release-notes.md
