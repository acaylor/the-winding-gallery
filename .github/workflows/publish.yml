name: Publish to npm

# Publishes via npm trusted publishing (OIDC) — no NPM_TOKEN secret needed.
# One-time setup on npmjs.com → package → Settings → Trusted publisher:
#   GitHub Actions · owner: acaylor · repo: the-winding-gallery · workflow: publish.yml
on:
  push:
    tags: ['v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token exchange with the npm registry
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          registry-url: https://registry.npmjs.org
      # deps + tests via pnpm; the publish itself uses the npm CLI,
      # which is what npm's trusted publishing requires (≥ 11.5.1)
      - run: npm install -g npm@latest
      - run: pnpm install --frozen-lockfile
      - run: pnpm test
      - name: Check tag matches package.json version
        run: |
          PKG_V="v$(node -p "require('./package.json').version")"
          if [ "$PKG_V" != "${GITHUB_REF_NAME}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package.json version ${PKG_V}" >&2
            exit 1
          fi
      - run: npm publish --provenance
