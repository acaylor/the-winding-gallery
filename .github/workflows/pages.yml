name: Deploy site

# The site's screenshots are captured here, at deploy time, from the code
# being deployed — they are not committed to the repo (issue #12). docs/
# plus the fresh captures ship together as the Pages artifact.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'public/**'
      - 'bin/**'
      - 'server.js'
      - 'scripts/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # playwright drives the captures; CI-only, never a package dependency
      - run: pnpm add -D playwright
      - run: pnpm exec playwright install --with-deps chromium
      - run: node scripts/capture-site-shots.mjs --out=_site/screenshots
      - run: cp -R docs/. _site/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v5
